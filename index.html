<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>轻轻记录</title>
  <link rel="stylesheet" href="css/style.css?v=20260404d">
</head>
<body>
  <header class="top-bar">
    <div class="title-wrap">
      <h1 class="app-title">轻轻记录</h1>
      <div class="app-kicker" id="top-date"></div>
    </div>
    <div class="top-actions">
      <div class="date-nav">
        <button class="btn-icon" id="btn-prev-day" title="前一天" aria-label="前一天">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <button class="btn-today" id="btn-today">今天</button>
        <button class="btn-icon" id="btn-next-day" title="后一天" aria-label="后一天">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
      <button class="btn-icon" id="btn-sync" title="同步数据" aria-label="同步数据">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"></path>
          <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"></path>
        </svg>
      </button>
      <button class="btn-icon" id="btn-export" title="导出数据" aria-label="导出数据">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </button>
    </div>
  </header>

  <main class="main-content" id="main-content"></main>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="btn-icon modal-close" id="modal-close" aria-label="关闭">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="js/storage.js?v=20260404d"></script>
  <script src="js/sync.js?v=20260404d"></script>
  <script src="js/app.js?v=20260404d"></script>
</body>
</html>
